name: ci

# PR + push gate. release.yml handles tagged binary builds and npm publish;
# this workflow only runs the cheap checks every contributor change needs.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  # rustsec/audit-check posts the audit summary as a GitHub check run,
  # which requires write access to the Checks API.
  checks: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: tests
        run: cargo test --all

      - name: release build
        run: cargo build --release

      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fail only on real vulnerabilities. Informational advisories
          # (unmaintained / unsound deps) still get reported in the
          # check summary but don't block the PR — they're often
          # transitive deps we can't fix in this repo.
          denyWarnings: false
